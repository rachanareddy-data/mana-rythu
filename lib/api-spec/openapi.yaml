openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Mana Rythu API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: users
  - name: crops
  - name: listings
  - name: reviews
  - name: notifications
  - name: admin
  - name: dashboard
  - name: ai
  - name: orders
  - name: chat

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      responses:
        "200":
          description: Logged out

  /users:
    get:
      operationId: getUsers
      tags: [users]
      parameters:
        - name: role
          in: query
          schema:
            type: string
        - name: verified
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUserById
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}/profile:
    get:
      operationId: getUserProfile
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Full user profile with listings and reviews
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/{id}/verify:
    patch:
      operationId: verifyUser
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyUserInput"
      responses:
        "200":
          description: Verification updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}/rate:
    post:
      operationId: rateUser
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RatingInput"
      responses:
        "200":
          description: Rating submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /crops:
    get:
      operationId: getCrops
      tags: [crops]
      parameters:
        - name: farmerId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of crops
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Crop"
    post:
      operationId: createCrop
      tags: [crops]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CropInput"
      responses:
        "201":
          description: Crop created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Crop"

  /crops/{id}:
    get:
      operationId: getCropById
      tags: [crops]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Crop details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Crop"
    patch:
      operationId: updateCrop
      tags: [crops]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CropUpdate"
      responses:
        "200":
          description: Crop updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Crop"
    delete:
      operationId: deleteCrop
      tags: [crops]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Crop deleted

  /listings:
    get:
      operationId: getListings
      tags: [listings]
      parameters:
        - name: farmerId
          in: query
          schema:
            type: integer
        - name: cropName
          in: query
          schema:
            type: string
        - name: location
          in: query
          schema:
            type: string
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: trend
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Listing"
    post:
      operationId: createListing
      tags: [listings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListingInput"
      responses:
        "201":
          description: Listing created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"

  /listings/{id}:
    get:
      operationId: getListingById
      tags: [listings]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Listing details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
    patch:
      operationId: updateListing
      tags: [listings]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListingUpdate"
      responses:
        "200":
          description: Listing updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
    delete:
      operationId: deleteListing
      tags: [listings]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Listing deleted

  /listings/{id}/contact:
    post:
      operationId: contactFarmer
      tags: [listings]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "200":
          description: Contact request sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactResponse"

  /reviews:
    get:
      operationId: getReviews
      tags: [reviews]
      parameters:
        - name: toUserId
          in: query
          schema:
            type: integer
        - name: fromUserId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
    post:
      operationId: createReview
      tags: [reviews]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /reviews/{id}:
    delete:
      operationId: deleteReview
      tags: [reviews]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Review deleted

  /notifications:
    get:
      operationId: getNotifications
      tags: [notifications]
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationList"
    post:
      operationId: createNotification
      tags: [notifications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNotificationInput"
      responses:
        "201":
          description: Notification created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /notifications/read-all:
    patch:
      operationId: markAllNotificationsRead
      tags: [notifications]
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: All marked read
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required: [success]

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notification marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /ai/suggest-crop:
    get:
      operationId: suggestCrop
      tags: [ai]
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Crop name suggestions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CropSuggestion"

  /ai/chat:
    post:
      operationId: aiChat
      tags: [ai]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatInput"
      responses:
        "200":
          description: AI reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatReply"

  /ai/suggest-price:
    get:
      operationId: suggestPrice
      tags: [ai]
      parameters:
        - name: cropName
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Price suggestion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceSuggestion"

  /ai/grade-crop:
    post:
      operationId: gradeCrop
      tags: [ai]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CropGradeInput"
      responses:
        "200":
          description: Crop quality grade
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CropGrade"

  /ai/fair-price:
    get:
      operationId: getFairPrice
      tags: [ai]
      parameters:
        - name: cropName
          in: query
          required: true
          schema:
            type: string
        - name: quantity
          in: query
          schema:
            type: number
        - name: unit
          in: query
          schema:
            type: string
        - name: location
          in: query
          schema:
            type: string
        - name: grade
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Fair price analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FairPrice"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/market-prices:
    get:
      operationId: getMarketPrices
      tags: [dashboard]
      responses:
        "200":
          description: Market prices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketPrice"

  /dashboard/recommended-crops:
    get:
      operationId: getRecommendedCrops
      tags: [dashboard]
      responses:
        "200":
          description: Recommended crops
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecommendedCrop"

  /dashboard/weather:
    get:
      operationId: getWeather
      tags: [dashboard]
      responses:
        "200":
          description: Weather data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeatherSummary"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/users:
    get:
      operationId: getAdminUsers
      tags: [admin]
      parameters:
        - name: role
          in: query
          schema:
            type: string
        - name: verified
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"

  /admin/users/{id}/verify:
    patch:
      operationId: adminVerifyUser
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminVerifyInput"
      responses:
        "200":
          description: User verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

  /admin/users/{id}/suspend:
    patch:
      operationId: adminSuspendUser
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminSuspendInput"
      responses:
        "200":
          description: User suspended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSuspendResult"

  /admin/listings/{id}:
    delete:
      operationId: adminDeleteListing
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Listing deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  deletedId:
                    type: integer
                required: [success, deletedId]

  /orders:
    post:
      operationId: createOrder
      tags: [orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderInput"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    get:
      operationId: getOrders
      tags: [orders]
      parameters:
        - name: buyerId
          in: query
          schema:
            type: integer
        - name: farmerId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}/status:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusInput"
      responses:
        "200":
          description: Order status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /chat/conversation:
    post:
      operationId: createOrGetConversation
      tags: [chat]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationInput"
      responses:
        "201":
          description: Conversation created or found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /chat/conversations:
    get:
      operationId: getConversations
      tags: [chat]
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConversationSummary"

  /chat/conversation/{id}:
    get:
      operationId: getConversation
      tags: [chat]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /chat/message:
    post:
      operationId: sendMessage
      tags: [chat]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /chat/messages:
    get:
      operationId: getMessages
      tags: [chat]
      parameters:
        - name: conversationId
          in: query
          required: true
          schema:
            type: integer
        - name: markReadFor
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Messages in conversation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [farmer, buyer, admin]
        verified:
          type: boolean
        rating:
          type: ["number", "null"]
        ratingCount:
          type: integer
        phone:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        trustedBuyerScore:
          type: ["number", "null"]
        createdAt:
          type: string
      required: [id, name, email, role, verified, ratingCount, createdAt]

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [farmer, buyer, admin]
        verified:
          type: boolean
        rating:
          type: ["number", "null"]
        ratingCount:
          type: integer
        phone:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        trustedBuyerScore:
          type: ["number", "null"]
        createdAt:
          type: string
        totalListings:
          type: integer
        activeListings:
          type: integer
        totalReviews:
          type: integer
        recentListings:
          type: array
          items:
            $ref: "#/components/schemas/Listing"
        recentReviews:
          type: array
          items:
            $ref: "#/components/schemas/Review"
      required: [id, name, email, role, verified, ratingCount, createdAt, totalListings, activeListings, totalReviews, recentListings, recentReviews]

    RegisterInput:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [farmer, buyer]
        phone:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
      required: [name, email, password, role]

    LoginInput:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required: [user, token]

    VerifyUserInput:
      type: object
      properties:
        verified:
          type: boolean
      required: [verified]

    RatingInput:
      type: object
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
      required: [rating]

    Crop:
      type: object
      properties:
        id:
          type: integer
        farmerId:
          type: integer
        farmerName:
          type: ["string", "null"]
        cropName:
          type: string
        sowDate:
          type: ["string", "null"]
        harvestDate:
          type: ["string", "null"]
        status:
          type: string
          enum: [growing, ready, harvested]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, farmerId, cropName, status, createdAt]

    CropInput:
      type: object
      properties:
        farmerId:
          type: integer
        cropName:
          type: string
        sowDate:
          type: ["string", "null"]
        harvestDate:
          type: ["string", "null"]
        status:
          type: string
          enum: [growing, ready, harvested]
        notes:
          type: ["string", "null"]
      required: [farmerId, cropName, status]

    CropUpdate:
      type: object
      properties:
        cropName:
          type: string
        sowDate:
          type: ["string", "null"]
        harvestDate:
          type: ["string", "null"]
        status:
          type: string
          enum: [growing, ready, harvested]
        notes:
          type: ["string", "null"]

    Listing:
      type: object
      properties:
        id:
          type: integer
        farmerId:
          type: integer
        farmerName:
          type: ["string", "null"]
        farmerVerified:
          type: ["boolean", "null"]
        farmerRating:
          type: ["number", "null"]
        cropName:
          type: string
        minPrice:
          type: number
        maxPrice:
          type: number
